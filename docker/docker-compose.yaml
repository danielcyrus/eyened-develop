name: eyened-platform

services:

  server:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.server
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health?src=docker-compose', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    volumes:
      - ${EYENED_STORAGE_ROOT}:${EYENED_STORAGE_ROOT}

  client:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.client

  fileserver:
    env_file: .env
    image: nginx:latest
    ports:
      - "${PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_started
    volumes:
      # nginx configuration
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      # Thumbnail directory served by nginx
      - ${EYENED_STORAGE_ROOT}/thumbnails:/storage/thumbnails:ro
      # Add other read-only mounts for local datasets here
