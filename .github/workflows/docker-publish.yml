- name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # Match the names you created in GitHub Settings
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.server[cite: 1]
          push: true
          # Note the name change here too
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/eyened-server:latest
