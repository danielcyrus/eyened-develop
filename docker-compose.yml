version: '3.8'

services:
  db:
    image: mariadb:${MARIADB_VERSION:-10.11}
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${EYENED_DATABASE_DATABASE:-eyened_database}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT:-3876}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - eyened-network

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    env_file: .env
    ports:
      - "${REDIS_PORT:-3877}:6379"
    networks:
      - eyened-network

  server:
    image: ${DOCKER_USERNAME:-danielcyrus}/eyened-server:${IMAGE_TAG:-latest}
    env_file: .env
    ports:
      - "${API_SERVER_PORT:-3875}:8000"
    volumes:
      - ${STORAGE_BASEPATH}:/app/storage
      - ${IMAGES_BASEPATH}:/app/images
    depends_on:
      - db
      - redis
    networks:
      - eyened-network

  worker:
    image: ${DOCKER_USERNAME:-danielcyrus}/eyened-worker:${IMAGE_TAG:-latest}
    env_file: .env
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    volumes:
      - ${STORAGE_BASEPATH}:/app/storage
      - ${IMAGES_BASEPATH}:/app/images
    depends_on:
      - redis
    networks:
      - eyened-network

  client:
    image: ${DOCKER_USERNAME:-danielcyrus}/eyened-client:${IMAGE_TAG:-latest}
    env_file: .env
    ports:
      - "${CLIENT_PORT:-3874}:3000"
    networks:
      - eyened-network

  adminer:
    image: adminer:${ADMINER_VERSION:-latest}
    env_file: .env
    ports:
      - "${ADMINER_PORT:-3878}:8080"
    networks:
      - eyened-network

networks:
  eyened-network:
    driver: bridge

volumes:
  db_data: